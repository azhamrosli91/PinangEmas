    <style>
        :root {
            --gold-primary: #AA771C;
            --gold-soft: #D6BE72;
            --gold-light: #F7E8A6;
            --dark-bg: #FFFDF8;
            --surface-bg: #F8F5EE;
            --card-glass-bg: rgba(255, 255, 255, 0.86);
            --text-main: #101010;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #AA771C 0%, #F5DB79 48%, #B5872E 100%);
        }

        .text-gold {
            background: linear-gradient(135deg, #AA771C, #D0A23A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-gold {
            background-color: var(--gold-primary);
        }

        .bg-gold\/5 {
            background-color: rgba(170, 119, 28, 0.05);
        }

        .bg-gold\/10 {
            background-color: rgba(170, 119, 28, 0.1);
        }

        .bg-gold\/20 {
            background-color: rgba(170, 119, 28, 0.2);
        }

        .border-gold {
            border-color: var(--gold-primary);
        }

        .border-gold\/10 {
            border-color: rgba(170, 119, 28, 0.1);
        }

        .border-gold\/20 {
            border-color: rgba(170, 119, 28, 0.2);
        }

        .border-gold\/30 {
            border-color: rgba(170, 119, 28, 0.3);
        }

        .text-gold\/30 {
            color: rgba(170, 119, 28, 0.3);
            -webkit-text-fill-color: rgba(170, 119, 28, 0.3);
        }

        .text-gold\/40 {
            color: rgba(170, 119, 28, 0.4);
            -webkit-text-fill-color: rgba(170, 119, 28, 0.4);
        }

        .text-gold\/50 {
            color: rgba(170, 119, 28, 0.5);
            -webkit-text-fill-color: rgba(170, 119, 28, 0.5);
        }

        .text-gold\/60 {
            color: rgba(170, 119, 28, 0.6);
            -webkit-text-fill-color: rgba(170, 119, 28, 0.6);
        }

        .fill-gold {
            fill: var(--gold-primary);
        }

        .bg-dark-bg {
            background-color: var(--dark-bg);
        }

        .group:hover .group-hover\:text-gold,
        .group:hover .group-hover\/node\:text-gold {
            color: var(--gold-primary);
            -webkit-text-fill-color: var(--gold-primary);
        }

        .group:hover .group-hover\:bg-gold {
            background-color: var(--gold-primary);
        }

        .group:hover .group-hover\:bg-gold\/5 {
            background-color: rgba(170, 119, 28, 0.05);
        }

        .group:hover .group-hover\:bg-gold\/10,
        .group:hover .group-hover\/node\:bg-gold\/10 {
            background-color: rgba(170, 119, 28, 0.1);
        }

        .group:hover .group-hover\:border-gold,
        .group:hover .group-hover\/node\:border-gold {
            border-color: var(--gold-primary);
        }

        .group:hover .group-hover\:border-gold\/20,
        .group:hover .group-hover\/node\:border-gold\/20 {
            border-color: rgba(170, 119, 28, 0.2);
        }

        .group:hover .group-hover\:border-gold\/30,
        .group:hover .group-hover\/node\:border-gold\/30 {
            border-color: rgba(170, 119, 28, 0.3);
        }

        .group:hover .group-hover\:border-gold\/40,
        .group:hover .group-hover\/node\:border-gold\/40 {
            border-color: rgba(170, 119, 28, 0.4);
        }

        .bg-dark-surface {
            background-color: var(--surface-bg);
            transition: background-color 0.5s ease;
        }

        .card-glass {
            background: var(--card-glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 119, 28, 0.22);
            box-shadow: 0 22px 50px rgba(92, 72, 33, 0.09);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-glass:hover {
            border-color: rgba(170, 119, 28, 0.48);
            background: rgba(255, 255, 255, 0.96);
            transform: translateY(-4px);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #D8C892;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #AA771C;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 0.6;
            }

            80% {
                opacity: 0.6;
            }

            100% {
                transform: translate(100px, -100px) rotate(360deg);
                opacity: 0;
            }
        }

        .gold-particle {
            position: absolute;
            background: radial-gradient(circle, #FCF6BA, #AA771C);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            animation: drift var(--duration) linear infinite;
            animation-delay: var(--delay);
            left: var(--left);
            top: var(--top);
            width: var(--size);
            height: var(--size);
        }

        /* Image Shimmer Effect */
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .shimmer-bg {
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0.03) 25%,
                    rgba(255, 255, 255, 0.08) 50%,
                    rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
